<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mine Runner — Admin Panel</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=JetBrains+Mono:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #12121a;
    --surface2: #1a1a26;
    --border: #2a2a3a;
    --gold: #FFD700;
    --green: #4CAF50;
    --red: #ff4444;
    --blue: #4a9eff;
    --purple: #9b59b6;
    --text: #e0e0f0;
    --muted: #666680;
    --pixel: 'Press Start 2P', monospace;
    --mono: 'JetBrains Mono', monospace;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--mono);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Grid background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: 
      linear-gradient(rgba(255,215,0,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,215,0,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  .container { position: relative; z-index: 1; max-width: 1200px; margin: 0 auto; padding: 20px; }

  /* Login Screen */
  #login-screen {
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
  }

  .login-box {
    background: var(--surface);
    border: 2px solid var(--gold);
    padding: 40px;
    text-align: center;
    max-width: 400px;
    width: 100%;
    position: relative;
  }

  .login-box::before {
    content: '';
    position: absolute;
    inset: -6px;
    border: 1px solid rgba(255,215,0,0.2);
  }

  .login-title {
    font-family: var(--pixel);
    font-size: 11px;
    color: var(--gold);
    margin-bottom: 8px;
    text-shadow: 0 0 20px rgba(255,215,0,0.5);
  }

  .login-sub {
    color: var(--muted);
    font-size: 11px;
    margin-bottom: 30px;
  }

  .login-input {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 12px 16px;
    font-family: var(--mono);
    font-size: 13px;
    margin-bottom: 16px;
    outline: none;
    transition: border-color 0.2s;
  }

  .login-input:focus { border-color: var(--gold); }

  .login-btn {
    width: 100%;
    background: var(--gold);
    color: #000;
    border: none;
    padding: 12px;
    font-family: var(--pixel);
    font-size: 9px;
    cursor: pointer;
    transition: opacity 0.2s;
  }

  .login-btn:hover { opacity: 0.85; }
  .login-error { color: var(--red); font-size: 11px; margin-top: 12px; display: none; }

  /* Main Panel */
  #main-panel { display: none; }

  /* Header */
  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 0;
    border-bottom: 1px solid var(--border);
    margin-bottom: 24px;
  }

  .header-title {
    font-family: var(--pixel);
    font-size: 10px;
    color: var(--gold);
    text-shadow: 0 0 15px rgba(255,215,0,0.4);
  }

  .header-right {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .refresh-btn {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 8px 16px;
    font-family: var(--mono);
    font-size: 11px;
    cursor: pointer;
    transition: all 0.2s;
  }

  .refresh-btn:hover { border-color: var(--gold); color: var(--gold); }

  /* Stats Cards */
  .stats-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 16px;
    margin-bottom: 24px;
  }

  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 20px;
    position: relative;
    overflow: hidden;
  }

  .stat-card::after {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
  }

  .stat-card.gold::after { background: var(--gold); }
  .stat-card.green::after { background: var(--green); }
  .stat-card.blue::after { background: var(--blue); }
  .stat-card.purple::after { background: var(--purple); }

  .stat-label {
    color: var(--muted);
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 2px;
    margin-bottom: 10px;
  }

  .stat-value {
    font-family: var(--pixel);
    font-size: 18px;
    color: var(--text);
  }

  .stat-card.gold .stat-value { color: var(--gold); }
  .stat-card.green .stat-value { color: var(--green); }
  .stat-card.blue .stat-value { color: var(--blue); }
  .stat-card.purple .stat-value { color: var(--purple); }

  /* Airdrop Calculator */
  .calculator {
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 24px;
    margin-bottom: 24px;
    position: relative;
  }

  .calculator::before {
    content: '⛏ AIRDROP CALCULATOR';
    position: absolute;
    top: -10px; left: 20px;
    background: var(--surface);
    padding: 0 8px;
    font-family: var(--pixel);
    font-size: 7px;
    color: var(--gold);
  }

  .calc-grid {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 16px;
    margin-bottom: 20px;
  }

  @media (max-width: 600px) { .calc-grid { grid-template-columns: 1fr; } }

  .calc-field label {
    display: block;
    color: var(--muted);
    font-size: 10px;
    margin-bottom: 6px;
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  .calc-field input {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 10px 12px;
    font-family: var(--mono);
    font-size: 13px;
    outline: none;
    transition: border-color 0.2s;
  }

  .calc-field input:focus { border-color: var(--gold); }

  .calc-result {
    background: var(--bg);
    border: 1px solid var(--gold);
    padding: 16px;
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 16px;
    text-align: center;
  }

  .calc-result-item label {
    color: var(--muted);
    font-size: 9px;
    display: block;
    margin-bottom: 4px;
    text-transform: uppercase;
  }

  .calc-result-item span {
    font-family: var(--pixel);
    font-size: 12px;
    color: var(--gold);
  }

  /* Users Table */
  .table-wrapper {
    background: var(--surface);
    border: 1px solid var(--border);
    position: relative;
    margin-bottom: 24px;
  }

  .table-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px 20px;
    border-bottom: 1px solid var(--border);
  }

  .table-title {
    font-family: var(--pixel);
    font-size: 8px;
    color: var(--text);
  }

  .search-input {
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 8px 12px;
    font-family: var(--mono);
    font-size: 11px;
    outline: none;
    width: 200px;
  }

  .search-input:focus { border-color: var(--gold); }

  table { width: 100%; border-collapse: collapse; }

  th {
    text-align: left;
    padding: 12px 20px;
    font-size: 9px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 2px;
    border-bottom: 1px solid var(--border);
    background: var(--surface2);
  }

  td {
    padding: 12px 20px;
    font-size: 12px;
    border-bottom: 1px solid rgba(255,255,255,0.04);
    vertical-align: middle;
  }

  tr:hover td { background: rgba(255,215,0,0.02); }

  .rank-badge {
    font-family: var(--pixel);
    font-size: 8px;
    padding: 3px 6px;
    background: rgba(255,215,0,0.1);
    color: var(--gold);
    border: 1px solid rgba(255,215,0,0.3);
  }

  .wallet-addr {
    font-size: 10px;
    color: var(--blue);
    font-family: var(--mono);
  }

  .wallet-none {
    color: var(--muted);
    font-size: 10px;
    font-style: italic;
  }

  .score-val { color: var(--green); font-weight: 600; }
  .coins-val { color: var(--gold); }
  .token-val { color: var(--purple); font-weight: 600; }

  .export-btn {
    background: var(--green);
    color: #000;
    border: none;
    padding: 10px 20px;
    font-family: var(--pixel);
    font-size: 7px;
    cursor: pointer;
    transition: opacity 0.2s;
  }

  .export-btn:hover { opacity: 0.85; }

  /* Loading */
  .loading {
    text-align: center;
    padding: 60px;
    color: var(--muted);
    font-size: 11px;
  }

  .loading::after {
    content: '';
    display: inline-block;
    width: 8px;
    height: 8px;
    background: var(--gold);
    margin-left: 8px;
    animation: blink 0.8s infinite;
  }

  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

  .empty-state {
    text-align: center;
    padding: 60px;
    color: var(--muted);
    font-family: var(--pixel);
    font-size: 8px;
    line-height: 2;
  }

  .token-formula {
    background: rgba(155,89,182,0.1);
    border: 1px solid rgba(155,89,182,0.3);
    padding: 12px 16px;
    margin-top: 12px;
    font-size: 11px;
    color: var(--purple);
    line-height: 1.8;
  }

  .pill {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 0;
    font-size: 9px;
    font-family: var(--pixel);
  }

  .pill-wallet { background: rgba(74,158,255,0.15); color: var(--blue); border: 1px solid rgba(74,158,255,0.3); }
  .pill-nowallet { background: rgba(255,68,68,0.1); color: var(--red); border: 1px solid rgba(255,68,68,0.2); }
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-box">
    <div class="login-title">⛏ MINE RUNNER</div>
    <div class="login-sub">Admin Panel v1.0</div>
    <input type="password" class="login-input" id="admin-key" placeholder="Enter admin key..." />
    <button class="login-btn" onclick="doLogin()">ACCESS PANEL</button>
    <div class="login-error" id="login-error">Invalid admin key!</div>
  </div>
</div>

<!-- MAIN PANEL -->
<div id="main-panel">
  <div class="container">

    <div class="header">
      <div class="header-title">⛏ MINE RUNNER — ADMIN</div>
      <div class="header-right">
        <span id="last-updated" style="color:var(--muted);font-size:10px;"></span>
        <button class="refresh-btn" onclick="loadData()">↻ REFRESH</button>
        <button class="export-btn" onclick="exportCSV()">📥 EXPORT CSV</button>
      </div>
    </div>

    <!-- STATS -->
    <div class="stats-grid">
      <div class="stat-card gold">
        <div class="stat-label">Total Players</div>
        <div class="stat-value" id="stat-total">—</div>
      </div>
      <div class="stat-card green">
        <div class="stat-label">Wallets Connected</div>
        <div class="stat-value" id="stat-wallets">—</div>
      </div>
      <div class="stat-card blue">
        <div class="stat-label">Total Coins Earned</div>
        <div class="stat-value" id="stat-coins">—</div>
      </div>
      <div class="stat-card purple">
        <div class="stat-label">Airdrop Eligible</div>
        <div class="stat-value" id="stat-eligible">—</div>
      </div>
    </div>

    <!-- AIRDROP CALCULATOR -->
    <div class="calculator">
      <div class="calc-grid">
        <div class="calc-field">
          <label>Total Token Supply</label>
          <input type="number" id="calc-supply" value="100000000" oninput="calcAirdrop()" />
        </div>
        <div class="calc-field">
          <label>Airdrop % of Supply</label>
          <input type="number" id="calc-percent" value="20" min="1" max="100" oninput="calcAirdrop()" />
        </div>
        <div class="calc-field">
          <label>Token Name/Symbol</label>
          <input type="text" id="calc-symbol" value="MNR" />
        </div>
      </div>
      <div class="calc-result">
        <div class="calc-result-item">
          <label>Tokens for Airdrop</label>
          <span id="calc-airdrop-tokens">—</span>
        </div>
        <div class="calc-result-item">
          <label>Tokens per Coin</label>
          <span id="calc-per-coin">—</span>
        </div>
        <div class="calc-result-item">
          <label>Avg per Player</label>
          <span id="calc-avg">—</span>
        </div>
      </div>
      <div class="token-formula" id="token-formula">
        Formula: 1 Coin = ? MNR Token — Set supply and percentage above
      </div>
    </div>

    <!-- USERS TABLE -->
    <div class="table-wrapper">
      <div class="table-header">
        <div class="table-title">🏆 PLAYER LEADERBOARD</div>
        <input type="text" class="search-input" placeholder="Search player..." oninput="filterUsers(this.value)" />
      </div>
      <div id="table-body">
        <div class="loading">Loading player data</div>
      </div>
    </div>

  </div>
</div>

<script>
const WORKER = 'https://mine-runner-backend.vinodkumarpursh.workers.dev';
const ADMIN_KEY = 'minerunner_admin_2024';
let allUsers = [];
let tokenPerCoin = 0;

function doLogin(){
  const key = document.getElementById('admin-key').value.trim();
  if(key === ADMIN_KEY){
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('main-panel').style.display = 'block';
    loadData();
  } else {
    document.getElementById('login-error').style.display = 'block';
  }
}

document.getElementById('admin-key').addEventListener('keydown', function(e){
  if(e.key === 'Enter') doLogin();
});

async function loadData(){
  document.getElementById('table-body').innerHTML = '<div class="loading">Loading player data</div>';
  try {
    const res = await fetch(WORKER + '/admin/users?key=' + ADMIN_KEY);
    const data = await res.json();
    if(!data.ok){ 
      document.getElementById('table-body').innerHTML = '<div class="empty-state">ERROR LOADING DATA</div>';
      return; 
    }
    allUsers = data.users || [];
    renderStats();
    renderTable(allUsers);
    calcAirdrop();
    document.getElementById('last-updated').textContent = 'Updated: ' + new Date().toLocaleTimeString();
  } catch(e){
    document.getElementById('table-body').innerHTML = '<div class="empty-state">NETWORK ERROR<br>' + e.message + '</div>';
  }
}

function renderStats(){
  const total = allUsers.length;
  const withWallet = allUsers.filter(u => u.wallet).length;
  const totalCoins = allUsers.reduce((s, u) => s + (u.score || 0), 0);
  const eligible = allUsers.filter(u => u.wallet && u.score > 0).length;

  document.getElementById('stat-total').textContent = total;
  document.getElementById('stat-wallets').textContent = withWallet;
  document.getElementById('stat-coins').textContent = totalCoins.toLocaleString();
  document.getElementById('stat-eligible').textContent = eligible;
}

function calcAirdrop(){
  const supply = parseInt(document.getElementById('calc-supply').value) || 0;
  const pct = parseFloat(document.getElementById('calc-percent').value) || 0;
  const symbol = document.getElementById('calc-symbol').value || 'TOKEN';
  const airdropTokens = Math.floor(supply * pct / 100);
  const totalCoins = allUsers.reduce((s, u) => s + (u.score || 0), 0);
  tokenPerCoin = totalCoins > 0 ? airdropTokens / totalCoins : 0;
  const avgPerPlayer = allUsers.length > 0 ? Math.floor(airdropTokens / allUsers.length) : 0;

  document.getElementById('calc-airdrop-tokens').textContent = airdropTokens.toLocaleString();
  document.getElementById('calc-per-coin').textContent = tokenPerCoin.toFixed(4);
  document.getElementById('calc-avg').textContent = avgPerPlayer.toLocaleString();
  document.getElementById('token-formula').textContent = 
    'Formula: 1 Score Point = ' + tokenPerCoin.toFixed(4) + ' ' + symbol + 
    ' | Wallet-connected players get 1.5x bonus';

  // Re-render table with updated token values
  if(allUsers.length > 0) renderTable(allUsers);
}

function renderTable(users){
  if(users.length === 0){
    document.getElementById('table-body').innerHTML = '<div class="empty-state">NO PLAYERS YET<br>Data will appear after players submit scores</div>';
    return;
  }
  const symbol = document.getElementById('calc-symbol').value || 'TOKEN';
  let html = '<table><thead><tr>' +
    '<th>Rank</th><th>Player</th><th>Score</th>' +
    '<th>Wallet</th><th>Est. Tokens</th><th>Commission</th>' +
    '</tr></thead><tbody>';

  users.forEach(function(u, i){
    const rank = i + 1;
    const rankIcon = rank === 1 ? '🥇' : rank === 2 ? '🥈' : rank === 3 ? '🥉' : '#' + rank;
    const score = u.score || 0;
    const hasWallet = !!u.wallet;
    const multiplier = hasWallet ? 1.5 : 1.0;
    const tokens = Math.floor(score * tokenPerCoin * multiplier);
    const shortWallet = u.wallet ? u.wallet.slice(0,8) + '...' + u.wallet.slice(-6) : null;
    const commission = u.totalCommission || 0;

    html += '<tr>' +
      '<td><span class="rank-badge">' + rankIcon + '</span></td>' +
      '<td><strong>' + (u.username || 'Player') + '</strong><br><span style="color:var(--muted);font-size:9px;">' + (u.userId || '') + '</span></td>' +
      '<td><span class="score-val">' + score.toLocaleString() + '</span></td>' +
      '<td>' + (hasWallet 
        ? '<span class="pill pill-wallet">✓ CONNECTED</span><br><span class="wallet-addr">' + shortWallet + '</span>'
        : '<span class="pill pill-nowallet">NO WALLET</span>') + '</td>' +
      '<td><span class="token-val">' + tokens.toLocaleString() + ' ' + symbol + '</span>' + (hasWallet ? '<br><span style="color:var(--green);font-size:9px;">+50% bonus</span>' : '') + '</td>' +
      '<td><span class="coins-val">🪙 ' + commission + '</span></td>' +
    '</tr>';
  });

  html += '</tbody></table>';
  document.getElementById('table-body').innerHTML = html;
}

function filterUsers(q){
  const filtered = allUsers.filter(u => 
    (u.username || '').toLowerCase().includes(q.toLowerCase()) ||
    (u.userId || '').includes(q)
  );
  renderTable(filtered);
}

function exportCSV(){
  if(!allUsers.length){ alert('No data to export!'); return; }
  const symbol = document.getElementById('calc-symbol').value || 'TOKEN';
  let csv = 'Rank,Username,UserID,Score,Wallet,EstTokens,Commission\n';
  allUsers.forEach(function(u, i){
    const tokens = Math.floor((u.score||0) * tokenPerCoin * (u.wallet ? 1.5 : 1.0));
    csv += (i+1) + ',' + 
      '"' + (u.username||'Player') + '",' +
      (u.userId||'') + ',' +
      (u.score||0) + ',' +
      (u.wallet||'') + ',' +
      tokens + ',' +
      (u.totalCommission||0) + '\n';
  });
  const blob = new Blob([csv], { type: 'text/csv' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'mine-runner-airdrop-' + new Date().toISOString().slice(0,10) + '.csv';
  a.click();
}
</script>
</body>
</html>
